<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SeqMix Pro  | NGS</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script>
        window.App = {
            state: {
                historyData: [],
                currentResult: null,
                isDarkMode: false
            }
        };
    </script>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔬 SeqMix Pro</h1>
            <div class="lang-selector">
                <button class="lang-btn active" data-lang="zh" onclick="switchLanguage('zh')">中文</button>
                <button class="lang-btn" data-lang="en" onclick="switchLanguage('en')">EN</button>
            </div>
        </div>

        <div class="main-grid">
            <!-- 输入面板 -->
            <div class="card">
                <div class="card-title" data-i18n="platform">📝 输入参数</div>
                
                <div class="platform-selector">
                    <div class="platform-btn active" data-platform="novaseq" onclick="selectPlatform(this)">NovaSeq</div>
                    <div class="platform-btn" data-platform="miseq" onclick="selectPlatform(this)">MiSeq</div>
                    <div class="platform-btn" data-platform="novaseq_xp" onclick="selectPlatform(this)">NovaSeq XP</div>
                    <div class="platform-btn" data-platform="pro_1000M-S" onclick="selectPlatform(this)">pro_1000M-S</div>
                    <div class="platform-btn" data-platform="pro_1000M-T" onclick="selectPlatform(this)">pro_1000M-T</div>
                    <div class="platform-btn" data-platform="EVO_3000M-S" onclick="selectPlatform(this)">EVO_3000M-S</div>
                    <div class="platform-btn" data-platform="EVO_3000M-T" onclick="selectPlatform(this)">EVO_3000M-T</div>
                    <div class="platform-btn" data-platform="nimbo" onclick="selectPlatform(this)">Nimbo</div>
                </div>

                <div id="reagentInputs"></div>

                <div class="input-group">
                    <label data-i18n="q_value">Q实测定量 (ng/μL)</label>
                    <input type="number" id="qValue" value="2.18" step="0.01">
                </div>
                <div class="input-group">
                    <label data-i18n="fragment_length">片段长度 (bp)</label>
                    <input type="number" id="fragmentLength" value="420" step="1">
                </div>
                <div class="input-group">
                    <label data-i18n="target_pm">上机浓度 (pM)</label>
                    <input type="number" id="targetPM" value="125" step="0.1">
                </div>

                <button class="btn btn-primary" onclick="calculate()" style="width:100%; margin:15px 0 8px;" data-i18n="calculate">🧮 开始计算</button>
                <button class="btn btn-secondary" onclick="resetForm()" style="width:100%;" data-i18n="reset">🔄 重置表单</button>
            </div>

            <!-- 结果面板 -->
            <div class="card">
                <div class="card-title" data-i18n="result_title">📊 计算结果</div>
                
                <div class="result-item"><span data-i18n="quant_conc">定量浓度 (nM)</span><span class="result-value" id="resultQuantNM">--</span></div>
                <div class="result-item"><span data-i18n="library_volume">取文库原液体积 (μL)</span><span class="result-value" id="resultSampleVol">--</span></div>
                <div class="result-item"><span id="resultBufferLabel">RMP4 补足体积 (μL)</span><span class="result-value" id="resultBufferVol">--</span></div>
                <div class="result-item"><span data-i18n="dilution">稀释倍数</span><span class="result-value" id="resultDilution">--</span></div>

                <div style="margin-top: 25px;">
                    <div class="card-title" style="border-bottom-color: #00c48c;" data-i18n="mix_protocol">🧪 上机混合方案</div>
                    <table class="mix-table" id="mixTable">
                        <thead>
                            <tr>
                                <th data-i18n="step">试验方案 / 添加顺序</th>
                                <th data-i18n="component">组分</th>
                                <th data-i18n="volume">体积 (μL)</th>
                                <th data-i18n="description">说明</th>
                            </tr>
                        </thead>
                        <tbody id="mixTableBody"></tbody>
                    </table>
                </div>

                <div class="btn-group">
                    <button class="btn btn-success" onclick="addToHistory()">💾 保存记录</button>
                    <button class="btn btn-primary" onclick="exportPDF()" data-i18n="export_pdf">📄 导出PDF</button>
                    <button class="btn btn-secondary" onclick="exportCSV()" data-i18n="export_csv">📥 导出CSV</button>
                    <button class="btn btn-secondary" id="darkModeBtn" onclick="toggleDarkMode()">🌙 暗黑模式</button>
                </div>
            </div>
        </div>

        <!-- 历史记录 -->
        <div class="card">
            <div class="card-title" data-i18n="history">📋 计算历史记录 <small>(本次会话)</small></div>
            <div style="overflow-x:auto;">
                <table class="history-table" id="historyTable">
                    <thead>
                        <tr>
                            <th data-i18n="date">时间</th>
                            <th data-i18n="platform">机型</th>
                            <th data-i18n="q_val">Q值</th>
                            <th data-i18n="frag_len">bp</th>
                            <th data-i18n="lib_vol">原液(μL)</th>
                            <th data-i18n="buf_vol">补足(μL)</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="historyBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- 页脚信息 -->
    <div class="footer">
        <p><strong>SeqMix Pro</strong> v1.0.0 | <span data-i18n="created_by">制作人</span>: zhangyuanshen (justin)</p>
    </div>

    <script src="js/i18n.js"></script>
    <script src="js/platforms-config.js"></script>
    <script src="js/platform.js"></script>
    <script src="js/calculator.js"></script>
    <script src="js/history.js"></script>
    <script src="js/export.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
