<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测序文库上机浓度计算工具 | Illumina NGS</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script>
        window.App = {
            state: {
                historyData: [],
                currentResult: null,
                isDarkMode: false
            }
        };
    </script>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔬 测序文库上机浓度计算工具</h1>

        </div>

        <div class="main-grid">
            <!-- 输入面板 -->
            <div class="card">
                <div class="card-title">📝 输入参数</div>
                
                <div class="platform-selector">
                    <div class="platform-btn active" data-platform="novaseq" onclick="selectPlatform(this)">NovaSeq</div>
                    <div class="platform-btn" data-platform="miseq" onclick="selectPlatform(this)">MiSeq</div>
                    <div class="platform-btn" data-platform="novaseq_xp" onclick="selectPlatform(this)">NovaSeq XP</div>
                    <div class="platform-btn" data-platform="pro_1000M-S" onclick="selectPlatform(this)">pro_1000M-S</div>
                    <div class="platform-btn" data-platform="pro_1000M-T" onclick="selectPlatform(this)">pro_1000M-T</div>
                    <div class="platform-btn" data-platform="EVO_3000M-S" onclick="selectPlatform(this)">EVO_3000M-S</div>
                    <div class="platform-btn" data-platform="EVO_3000M-T" onclick="selectPlatform(this)">EVO_3000M-T</div>
                    <div class="platform-btn" data-platform="nimbo" onclick="selectPlatform(this)">Nimbo</div>
                </div>

                <div id="reagentInputs"></div>

                <div class="input-group">
                    <label>Q实测定量 (ng/μL)</label>
                    <input type="number" id="qValue" value="2.18" step="0.01">
                </div>
                <div class="input-group">
                    <label>片段长度 (bp)</label>
                    <input type="number" id="fragmentLength" value="420" step="1">
                </div>
                <div class="input-group">
                    <label>上机浓度 (pM)</label>
                    <input type="number" id="targetPM" value="125" step="0.1">
                </div>

                <button class="btn btn-primary" onclick="calculate()" style="width:100%; margin:15px 0 8px;">🧮 开始计算</button>
                <button class="btn btn-secondary" onclick="resetForm()" style="width:100%;">🔄 重置表单</button>
            </div>

            <!-- 结果面板 -->
            <div class="card">
                <div class="card-title">📊 计算结果</div>
                
                <div class="result-item"><span>定量浓度 (nM)</span><span class="result-value" id="resultQuantNM">--</span></div>
                <div class="result-item"><span>取文库原液体积 (μL)</span><span class="result-value" id="resultSampleVol">--</span></div>
                <div class="result-item"><span id="resultBufferLabel">RMP4 补足体积 (μL)</span><span class="result-value" id="resultBufferVol">--</span></div>
                <div class="result-item"><span>稀释倍数</span><span class="result-value" id="resultDilution">--</span></div>

                <div style="margin-top: 25px;">
                    <div class="card-title" style="border-bottom-color: #00c48c;">🧪 上机混合方案</div>
                    <table class="mix-table" id="mixTable">
                        <thead>
                            <tr>
                                <th>试验方案 / 添加顺序</th>
                                <th>组分</th>
                                <th>体积 (μL)</th>
                                <th>说明</th>
                            </tr>
                        </thead>
                        <tbody id="mixTableBody"></tbody>
                    </table>
                </div>

                <div class="btn-group">
                    <button class="btn btn-success" onclick="addToHistory()">💾 保存记录</button>
                    <button class="btn btn-primary" onclick="exportPDF()">📄 导出PDF</button>
                    <button class="btn btn-secondary" onclick="exportCSV()">📥 导出CSV</button>
                    <button class="btn btn-secondary" id="darkModeBtn" onclick="toggleDarkMode()">🌙 暗黑模式</button>
                </div>
            </div>
        </div>

        <!-- 历史记录 -->
        <div class="card">
            <div class="card-title">📋 计算历史记录 <small>(本次会话)</small></div>
            <div style="overflow-x:auto;">
                <table class="history-table" id="historyTable">
                    <thead>
                        <tr>
                            <th>时间</th>
                            <th>机型</th>
                            <th>Q值</th>
                            <th>bp</th>
                            <th>原液(μL)</th>
                            <th>补足(μL)</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="historyBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="js/platforms-config.js"></script>
    <script src="js/platform.js"></script>
    <script src="js/calculator.js"></script>
    <script src="js/history.js"></script>
    <script src="js/export.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
